name: Game CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          python -m pip install pytest pytest-cov

      - name: Run Tests
        env:
          # Prevent CI from writing .pyc/__pycache__ into the repo workspace
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONPYCACHEPREFIX: /tmp/pycache
        run: |
          pytest tests/ -v

      - name: Check for syntax errors
        env:
          # Ensure compileall doesn't create __pycache__ in the repo
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONPYCACHEPREFIX: /tmp/pycache
        run: |
          python -m compileall .

      - name: Package Game (stable snapshot)
        run: |
          set -euo pipefail

          STAGE_DIR="/tmp/dungeon_crawl_pkg"
          rm -rf "${STAGE_DIR}"
          mkdir -p "${STAGE_DIR}"

          # Create a stable snapshot of the repo (avoids tar "file changed as we read it")
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.venv' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.pytest_cache' \
            --exclude='.coverage' \
            --exclude='htmlcov' \
            --exclude='*.egg-info' \
            --exclude='dist' \
            --exclude='build' \
            --exclude='*.tar.gz' \
            ./ "${STAGE_DIR}/"

          tar -C "${STAGE_DIR}" -czf dungeon_crawl.tar.gz .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dungeon_crawl_build
          path: dungeon_crawl.tar.gz
          if-no-files-found: error
