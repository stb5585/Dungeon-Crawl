name: Game CI

on: [push, pull_request]  # Runs when you push code or make a PR

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Pulls the latest code

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"  # Match local development environment

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .  # Install game with pyproject.toml
          pip install pytest pytest-cov  # Install testing framework

      - name: Run Tests
        run: pytest tests/ -v  # Runs tests with verbose output

      - name: Check for syntax errors
        run: python -m compileall .  # Catches syntax issues

      - name: Package Game
        run: tar -czf dungeon_crawl.tar.gz --exclude=.git --exclude=.venv --exclude=__pycache__ --exclude=*.pyc --exclude=.pytest_cache --exclude=dungeon_crawl.egg-info --exclude=dungeon_crawl.tar.gz .  # Creates a compressed archive

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dungeon_crawl_build
          path: dungeon_crawl.tar.gz
