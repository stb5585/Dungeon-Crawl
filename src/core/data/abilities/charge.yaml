name: Charge
type: ChargingSkill
subtype: Offensive
description: >-
  Charge the enemy, building momentum before stunning them and dealing
  weapon damage.
cost: 10
weapon: true
damage_mod: 1.25

# Charging mechanics
charge_time: 1
telegraph_message: "lowering their head and building momentum for a devastating charge"

effects:
  - type: charge_execute
    dmg_mod: 1.25
    stun_duration: 1

# Priority and targeting
priority: NORMAL
delay: 1

notes: |
  Offensive skill that requires charging and a weapon.
  Charge applies stun BEFORE dealing damage (str vs con check).
  Stun blocked by: immunity, Pendant of Stun/All, tunnel, Mana Shield.
  Used by: Minotaur, Centaur, and similar enemies.
