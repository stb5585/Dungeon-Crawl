name: Enfeeble
type: Status
subtype: Status
description: "Cripple your foe, reducing their attack and defense rating."
cost: 12
wizard_free_cast: true
messages:
  resist: "{target} resists the spell."
effects:
  - type: stat_contest
    actor_stat: intel
    actor_divisor: 1
    actor_lo_divisor: 2
    target_stat: con
    target_lo_divisor: 2
    target_hi_divisor: 2
    effect:
      type: dynamic_multi_debuff
      stats:
        - stat_name: Attack
          combat_attr: attack
        - stat_name: Defense
          combat_attr: defense
      scaling_stat: intel
      scaling_divisor: 10
      amount_divisor: 10
      duration_min: 3
