name: Arcane Blast
type: ChargingSkill
subtype: PowerUp
description: >-
  Expend all remaining mana in a devastating blast of arcane energy.
  If the enemy survives, mana will regenerate over the next 4 turns.
cost: 0
requires_any_mana: true

# Charging mechanics
charge_time: 1
telegraph_message: "channeling all remaining mana into a devastating blast"

effects:
  - type: arcane_blast
    regen_turns: 4
    regen_fraction: 0.1

# Priority and targeting
priority: NORMAL
delay: 1

notes: |
  Knight Enchanter power-up ability.
  Uses ALL remaining mana as magic damage via handle_defenses/damage_reduction.
  Drains mana to 0 after execution.
  If target survives, activates Power Up for 4-turn mana regen (10% per turn).
  Mana is captured at charge start, so damage is based on pre-charge mana.
