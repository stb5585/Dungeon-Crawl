name: Jump
type: JumpSkill
subtype: Offensive
description: >-
  Leap into the air and bring down your weapon onto the enemy,
  delivering increased damage.
cost: 10
weapon: true
damage_mod: 2.0

# Charging mechanics
charge_time: 1
telegraph_message: "coiling their legs, preparing to leap into the air"
prone_while_charging: true

effects:
  - type: jump_execute
    base_dmg_mod: 2.0

# Priority
priority: NORMAL

notes: |
  Offensive skill with full modification system.
  Charging can be modified by Quick Dive (instant) or Soaring Strike (2 turns).
  Unstoppable prevents interrupt. Retribution tracks charge-phase damage.
  13 total modifications: Crit, Thrust, Defend, Rend, Quake, Acrobat,
  Dragon's Fury, Soaring Strike, Quick Dive, Retribution, Unstoppable,
  Recover, Skyfall.
