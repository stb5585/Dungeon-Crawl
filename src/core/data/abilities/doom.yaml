name: Doom
type: Status
subtype: Death
description: "Places a timer on the enemy's life, ending it when the timer expires."
cost: 15
messages:
  success: "A timer has been placed on {target}'s life."
  immune: "{target} is immune to death spells."
  already: "{target} is already doomed."
  resist: "The magic has no effect."
effects:
  - type: stat_contest
    actor_stat: charisma
    actor_lo_divisor: 4
    target_stat: wisdom
    target_lo_divisor: 2
    target_check_lucky: true
    luck_factor: 10
    effect:
      type: status_apply
      status_name: Doom
      duration: 5
      skip_if_active: true
