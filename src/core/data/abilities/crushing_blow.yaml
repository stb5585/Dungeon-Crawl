name: Crushing Blow
type: ChargingSkill
subtype: Physical
description: >-
  A devastating overhead strike that takes time to wind up but deals
  massive damage.
cost: 25
weapon: true
damage_mod: 3.0

# Charging mechanics
charge_time: 1
telegraph_message: "raising weapon high for a crushing overhead strike"

effects:
  - type: crushing_blow
    dmg_mod: 3.0
    crit_override: 2
    stun_chance: 0.5
    stun_duration: 2

# Priority and targeting
priority: NORMAL
delay: 1

notes: |
  Powerful physical attack that requires wind-up.
  Deals triple normal weapon damage with doubled crit chance.
  50% chance to stun target for 2 turns.
  Stun blocked by: immunity, Pendant of Stun/All.
