name: Mortal Strike
type: Skill
subtype: Offensive
description: >-
  Devastating critical strike plus bleed; duration and damage determined by
  the player's strength. Requires a 2-handed weapon.
cost: 30
weapon: true
damage_mod: 1.5
crit_override: 3
effects:
