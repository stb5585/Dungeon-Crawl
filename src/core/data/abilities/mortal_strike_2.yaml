    effect_name: Bleed
    use_crit_multiplier: true
    damage_multiplier: 0.75
    actor_stat: strength
    actor_lo_divisor: 2
    actor_hi_divisor: 1
    target_stat: con
    target_lo_divisor: 2
    target_hi_divisor: 1
    duration_stat: strength
    duration_divisor: 10
    duration_min: 1
    skip_if_active: true
